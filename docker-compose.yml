services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casfin
      POSTGRES_USER: casfin
      POSTGRES_PASSWORD: casfin_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casfin"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run start:dev
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/*.spec.ts"
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

volumes:
  postgres_data:
